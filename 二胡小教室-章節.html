<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二胡小教室 | 10 週課表</title>
  <style>
    :root { --ink:#211914; --muted:#69584d; --paper:rgba(255,250,244,0.92); --line:rgba(83,57,39,0.12); --wood:#7b4d2d; --leaf:#4d6450; --shadow:0 22px 54px rgba(46,28,18,0.14); }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; background:linear-gradient(180deg,#f7efe3 0%,#fbf9f5 40%,#efe4d5 100%); }
    a { color:inherit; text-decoration:none; }
    .shell { width:min(1120px,calc(100% - 28px)); margin:0 auto; padding:24px 0 40px; }
    .topbar { display:flex; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
    .brand { font-size:22px; font-weight:800; letter-spacing:0.08em; }
    .nav { display:flex; gap:14px; flex-wrap:wrap; color:var(--muted); font-weight:700; }
    .hero,.panel { background:var(--paper); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); }
    .hero { padding:28px; margin-bottom:18px; }
    h1 { margin:0 0 10px; font-size:clamp(30px,5vw,46px); }
    .hero p,.panel p,.panel li { color:var(--muted); line-height:1.8; }
    .layout { display:grid; grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr); gap:18px; }
    .chapter-list { display:grid; gap:12px; }
    .chapter-card,.display { padding:18px; border-radius:20px; background:#fffdf8; border:1px solid var(--line); }
    .chapter-card { cursor:pointer; text-align:left; }
    .chapter-card.active { border-color:rgba(123,77,45,0.5); background:#fffcf6; }
    .chapter-card small { display:block; margin-bottom:6px; color:var(--wood); font-weight:700; }
    .meta { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .pill { display:inline-flex; padding:6px 10px; border-radius:999px; background:rgba(77,100,80,0.1); color:var(--leaf); font-size:13px; font-weight:700; }
    @media (max-width:860px) { .layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">二胡小教室</div>
      <nav class="nav">
        <a href="./二胡小教室.html">課程入口</a>
        <a href="./二胡小教室-影片.html">影片音檔</a>
        <a href="./二胡小教室-練習打卡.html">練習打卡</a>
        <a href="./二胡小教室-小測驗.html">小測驗</a>
      </nav>
    </header>
    <section class="hero">
      <h1>10 週課表</h1>
      <p>由基礎穩定一路推進到曲目整合。每一週都有明確主題、練習時長和任務，強度會逐步提高。</p>
    </section>
    <section class="panel" style="padding:24px;">
      <div class="layout">
        <div class="chapter-list" id="chapterList"></div>
        <div class="display">
          <div class="meta">
            <span class="pill" id="chapterLevel"></span>
            <span class="pill" id="chapterDuration"></span>
          </div>
          <h2 id="chapterTitle"></h2>
          <p id="chapterDescription"></p>
          <h3>本週重點</h3>
          <ul id="chapterPoints"></ul>
          <h3>當週任務</h3>
          <p id="chapterTask"></p>
        </div>
      </div>
    </section>
  <script>
    const chapters = [
      { id:"week-1", label:"第 1 週", title:"重整姿勢與基本長弓", level:"強度 1", duration:"每日 20 分鐘", description:"把身體、握弓與長弓穩定度重新拉回標準，這是後面加強度的底。", points:["每次練習前先做 2 分鐘姿勢檢查。","長弓必須保持音量平均，不追求速度。","先把肩膀和手腕放鬆，避免用力硬拉。"], task:"完成 5 天長弓練習，每天至少 20 分鐘，並錄 30 秒長音回聽。" },
      { id:"week-2", label:"第 2 週", title:"內外弦切換與弓路控制", level:"強度 2", duration:"每日 22 分鐘", description:"加入內外弦切換，練弓路乾淨與手肘轉換，開始要求穩定精準。", points:["切弦動作要小，不要整隻手甩。","維持同樣弓速，不因換弦而忽快忽慢。","練習時用慢拍器固定節奏。"], task:"完成 4 組切弦循環練習，並在固定拍速下不中斷拉完。" },
      { id:"week-3", label:"第 3 週", title:"音階與音準校正", level:"強度 3", duration:"每日 25 分鐘", description:"從空弦進到左手按音，開始把耳朵和手指位置一起建立起來。", points:["每個音都要先確認落點。","同一組音階重複多次，比一次拉很長更有效。","錄音回聽，確認偏高或偏低的習慣。"], task:"每天完成兩輪上行下行音階，並記下最不穩的 2 個音。" },
      { id:"week-4", label:"第 4 週", title:"短句節奏與弓法組合", level:"強度 4", duration:"每日 28 分鐘", description:"進入節奏控制，把長短弓、分弓、連弓放進短句裡。", points:["拍點比速度更重要。","短句先拆開，再接回完整段落。","注意弓法切換時的音色連續性。"], task:"完成 8 小節短句練習，至少 3 次在拍器下完整拉對。" },
      { id:"week-5", label:"第 5 週", title:"換把基礎與左手穩定", level:"強度 5", duration:"每日 30 分鐘", description:"開始進入較高強度的左手訓練，讓換把不再只靠猜位置。", points:["換把前先想好目標音。","動作要短、準，不要整隻手飄。","先單獨練換把，再回到旋律。"], task:"每天做 10 次換把目標音練習，再放進 4 小節旋律裡測試。" },
      { id:"week-6", label:"第 6 週", title:"揉弦起步與音色表情", level:"強度 6", duration:"每日 32 分鐘", description:"把基本音色拉穩之後，開始加入簡單表情，聲音要開始有起伏。", points:["揉弦先小幅度，不求誇張。","不要因為加表情就掉音準。","同一樂句嘗試不同力度層次。"], task:"選 4 個長音做揉弦練習，並在一段旋律中加入 2 個表情點。" },
      { id:"week-7", label:"第 7 週", title:"中段耐力與完整段落", level:"強度 7", duration:"每日 35 分鐘", description:"進入中後段訓練，重點改成耐力、段落連續性與專注力。", points:["每次要能連續拉完整段落。","錯音先標記，不要當場一直停。","練習後再拆出問題點補強。"], task:"完成至少 16 小節完整演奏，並記錄最常出錯的地方。" },
      { id:"week-8", label:"第 8 週", title:"速度提升與穩定維持", level:"強度 8", duration:"每日 38 分鐘", description:"開始提拍速，但穩定和乾淨不能掉。這週很容易因為急而變亂。", points:["每次只加一點拍速。","一旦亂掉就退回前一個速度。","速度上去時手仍要保持鬆。"], task:"把一段既有旋律提升 2 到 3 個速度階段，保持音準與節奏。" },
      { id:"week-9", label:"第 9 週", title:"表現整合與錄影回看", level:"強度 9", duration:"每日 40 分鐘", description:"技巧要開始整合成表現，透過錄影回看檢查姿勢、弓路和樂句。", points:["錄影比只錄音更容易看出動作問題。","樂句收尾與呼吸感要開始有設計。","不要只看錯音，也看整體流暢度。"], task:"錄一段 1 分鐘演奏，回看後寫下 3 個需要修正的點。" },
      { id:"week-10", label:"第 10 週", title:"模擬正式演奏與總驗收", level:"強度 10", duration:"每日 45 分鐘", description:"最後一週把前面 9 週累積的東西整合起來，做完整演奏與總結。", points:["從頭到尾一次完成，不中斷。","先求完整，再回修細節。","把練習模式切換成表演模式。"], task:"完成一次正式錄影版本，作為這 10 週的總驗收成果。" }
    ];
    const chapterList = document.getElementById("chapterList");
    const chapterTitle = document.getElementById("chapterTitle");
    const chapterLevel = document.getElementById("chapterLevel");
    const chapterDuration = document.getElementById("chapterDuration");
    const chapterDescription = document.getElementById("chapterDescription");
    const chapterPoints = document.getElementById("chapterPoints");
    const chapterTask = document.getElementById("chapterTask");
    function setActiveChapter(chapterId) {
      const current = chapters.find((chapter) => chapter.id === chapterId);
      if (!current) return;
      document.querySelectorAll(".chapter-card").forEach((card) => card.classList.toggle("active", card.dataset.chapterId === chapterId));
      chapterLevel.textContent = current.level;
      chapterDuration.textContent = current.duration;
      chapterTitle.textContent = current.title;
      chapterDescription.textContent = current.description;
      chapterTask.textContent = current.task;
      chapterPoints.innerHTML = "";
      current.points.forEach((point) => {
        const li = document.createElement("li");
        li.textContent = point;
        chapterPoints.appendChild(li);
      });
    }
    chapters.forEach((chapter, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "chapter-card";
      button.dataset.chapterId = chapter.id;
      button.innerHTML = "<small>" + chapter.label + "</small><strong>" + chapter.title + "</strong><div>" + chapter.description + "</div>";
      button.addEventListener("click", () => setActiveChapter(chapter.id));
      chapterList.appendChild(button);
      if (index === 0) setActiveChapter(chapter.id);
    });
  </script>
  </main>
</body>
</html>
