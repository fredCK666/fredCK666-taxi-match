<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二胡小教室 | 分級每週打卡</title>
  <style>
    :root { --muted:#f1e6d8; --ink:#fff8ef; --accent:#ffe0ad; --shadow:0 22px 54px rgba(46,28,18,0.14); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; background:linear-gradient(180deg,#f7efe3 0%,#fbf9f5 40%,#efe4d5 100%); color:#211914; }
    a { color:inherit; text-decoration:none; }
    .shell { width:min(1120px,calc(100% - 28px)); margin:0 auto; padding:24px 0 40px; }
    .topbar { display:flex; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
    .brand { font-size:22px; font-weight:800; letter-spacing:0.08em; }
    .nav { display:flex; gap:14px; flex-wrap:wrap; color:#69584d; font-weight:700; }
    .panel { padding:28px; border-radius:28px; background:linear-gradient(135deg,rgba(84,105,85,0.96),rgba(58,76,60,0.94)); color:var(--ink); box-shadow:var(--shadow); }
    h1 { margin:0 0 10px; font-size:clamp(30px,5vw,46px); }
    p { color:var(--muted); line-height:1.8; }
    .tabs { display:flex; gap:12px; flex-wrap:wrap; margin:18px 0 0; }
    .tab { padding:10px 16px; border-radius:999px; border:1px solid rgba(255,255,255,0.16); background:rgba(255,255,255,0.08); color:#fff8ef; font-weight:800; cursor:pointer; }
    .tab.active { background:#ffe0ad; color:#46301a; border-color:transparent; }
    .tracker-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin-top:18px; }
    .tracker-item { padding:16px; border-radius:18px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); }
    .tracker-item strong { display:block; margin-bottom:6px; color:var(--accent); }
    .tracker-item label { display:flex; gap:8px; align-items:center; cursor:pointer; color:#fff8ef; }
    .tracker-item input { width:18px; height:18px; accent-color:#ffd08f; }
    .summary { margin-top:14px; color:var(--accent); font-weight:800; }
    .button { display:inline-flex; align-items:center; justify-content:center; padding:12px 16px; border:1px solid rgba(255,255,255,0.16); border-radius:999px; background:rgba(255,255,255,0.14); color:#fff8ef; font-weight:800; cursor:pointer; margin-top:12px; }
    @media (max-width:860px) { .tracker-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">二胡小教室</div>
      <nav class="nav">
        <a href="./erhu/">回首頁</a>
        <a href="./二胡小教室.html">課程分級</a>
        <a href="./二胡小教室-影片.html">影片工具</a>
        <a href="./二胡小教室-小測驗.html">小測驗</a>
      </nav>
    </header>
    <section class="panel">
      <h1>分級每週打卡</h1>
      <p>初級、中級、高級各自分開打卡。你切換等級後，勾選的內容會各自保存在不同紀錄，不會互相覆蓋。</p>
      <div class="tabs" id="levelTabs"></div>
      <div class="tracker-grid" id="trackerGrid"></div>
      <div class="summary" id="trackerSummary">目前完成 0 / 10 週</div>
      <button class="button" id="resetTrackerButton" type="button">清除目前等級打卡</button>
    </section>
  <script>
    const courseTracks = {
      beginner: { label: "初級", items: [
        "完成姿勢與持琴重整", "完成基本長弓穩定", "完成內外弦切換", "完成節奏與短句",
        "完成左手按音基礎", "完成音階反覆校正", "完成分弓與連弓", "完成基礎旋律整合",
        "完成完整段落演奏", "完成初級成果驗收"
      ]},
      intermediate: { label: "中級", items: [
        "完成換把定位重整", "完成揉弦穩定起步", "完成音色控制訓練", "完成弓法組合進階",
        "完成中速節奏穩定", "完成段落與換氣感", "完成耐力與不中斷演奏", "完成速度提升訓練",
        "完成技巧整合到曲目", "完成中級成果錄影"
      ]},
      advanced: { label: "高級", items: [
        "完成高強度長弓控制", "完成快速換把與定位", "完成複合弓法連接", "完成揉弦與表情深化",
        "完成高速度節奏穩定", "完成段落推進與層次", "完成困難段拆解修正", "完成整首曲目連續演奏",
        "完成錄影回看與舞台修正", "完成高級總驗收"
      ]}
    };

    let currentLevel = "beginner";
    const levelTabs = document.getElementById("levelTabs");
    const trackerGrid = document.getElementById("trackerGrid");
    const trackerSummary = document.getElementById("trackerSummary");

    function storageKey() {
      return "erhu-practice-tracker-" + currentLevel;
    }

    function renderTabs() {
      levelTabs.innerHTML = "";
      Object.entries(courseTracks).forEach(([key, value]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "tab";
        button.textContent = value.label;
        button.addEventListener("click", () => setLevel(key));
        levelTabs.appendChild(button);
      });
    }

    function renderTracker() {
      const saved = JSON.parse(localStorage.getItem(storageKey()) || "{}");
      trackerGrid.innerHTML = "";
      courseTracks[currentLevel].items.forEach((text, index) => {
        const wrap = document.createElement("div");
        wrap.className = "tracker-item";
        const checked = Boolean(saved["week_" + (index + 1)]);
        wrap.innerHTML = "<strong>第 " + (index + 1) + " 週</strong><label><input type=\"checkbox\" data-track=\"week_" + (index + 1) + "\"" + (checked ? " checked" : "") + " /> " + text + "</label>";
        trackerGrid.appendChild(wrap);
      });
      bindTrackerEvents();
      updateSummary();
    }

    function bindTrackerEvents() {
      trackerGrid.querySelectorAll("[data-track]").forEach((checkbox) => {
        checkbox.addEventListener("change", saveTracker);
      });
    }

    function saveTracker() {
      const state = {};
      trackerGrid.querySelectorAll("[data-track]").forEach((checkbox) => {
        state[checkbox.dataset.track] = checkbox.checked;
      });
      localStorage.setItem(storageKey(), JSON.stringify(state));
      updateSummary();
    }

    function updateSummary() {
      const checkboxes = Array.from(trackerGrid.querySelectorAll("[data-track]"));
      const completed = checkboxes.filter((checkbox) => checkbox.checked).length;
      trackerSummary.textContent = courseTracks[currentLevel].label + "目前完成 " + completed + " / " + checkboxes.length + " 週";
    }

    function setLevel(levelKey) {
      currentLevel = levelKey;
      document.querySelectorAll(".tab").forEach((tab, index) => {
        const key = Object.keys(courseTracks)[index];
        tab.classList.toggle("active", key === levelKey);
      });
      renderTracker();
    }

    document.getElementById("resetTrackerButton").addEventListener("click", () => {
      trackerGrid.querySelectorAll("[data-track]").forEach((checkbox) => {
        checkbox.checked = false;
      });
      saveTracker();
    });

    renderTabs();
    setLevel("beginner");
  </script>
  </main>
</body>
</html>
