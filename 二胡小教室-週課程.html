<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二胡小教室 | 每週課程</title>
  <style>
    :root {
      --ink: #1f1713;
      --muted: #6b5d52;
      --wood: #7d4b2b;
      --gold: #f0ae3e;
      --paper: rgba(255, 250, 244, 0.96);
      --line: rgba(114, 75, 41, 0.08);
      --shadow: 0 24px 56px rgba(61, 39, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 207, 92, 0.34), transparent 22%),
        linear-gradient(180deg, #fff4dd 0%, #fffdfa 38%, #f3e6d9 100%);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
    }

    .brand {
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .hero,
    .panel,
    .score-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(240, 174, 62, 0.12);
      color: var(--wood);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 46px);
    }

    p, li {
      color: var(--muted);
      line-height: 1.8;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      gap: 18px;
    }

    .panel {
      padding: 24px;
    }

    .video-frame {
      overflow: hidden;
      border-radius: 20px;
      background: #18120f;
      aspect-ratio: 16 / 9;
      margin-bottom: 16px;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .bullet-list,
    .task-list {
      margin: 0;
      padding-left: 20px;
    }

    .score-card {
      padding: 22px;
    }

    .score-title {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .score-box {
      margin-top: 12px;
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,246,232,0.96), rgba(255,237,211,0.92));
      border: 1px solid rgba(125, 75, 43, 0.08);
    }

    .score-box pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--wood);
      font-size: 18px;
      line-height: 1.8;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .score-note {
      margin-top: 12px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 144px;
      padding: 12px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffd66b, #e7861d);
      color: #4a2f18;
      font-weight: 900;
    }

    .button.secondary {
      background: rgba(125, 75, 43, 0.08);
      color: var(--wood);
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    <header class="topbar">

    <section class="hero">

      <h1 id="weekTitle"></h1>
      <p id="weekDescription"></p>

      <article class="panel">

        <h2>本週教學重點</h2>
        <ul class="bullet-list" id="focusList"></ul>
        <h2>本週任務</h2>
        <ul class="task-list" id="taskList"></ul>
        <div class="actions">
          <a class="button secondary" id="prevWeekLink" href="#">上一週</a>
          <a class="button" id="nextWeekLink" href="#">下一週</a>
        </div>
      </article>

      <aside class="score-card">

        <div class="score-box">
          <pre id="scoreText"></pre>
        </div>
        <p class="score-note" id="scoreNote"></p>
      </aside>
    </section>
  </main>

    const params = new URLSearchParams(window.location.search);

    const course = weeklyData[level] || weeklyData.beginner;
    const data = course.weeks[week - 1];

    document.title = "二胡小教室 | " + course.label + "第 " + week + " 週";
    document.getElementById("backLevelLink").href = course.backLink;
    document.getElementById("backLevelLink").textContent = "回" + course.label + "課程";
    document.getElementById("weekLabel").textContent = course.label + "課程｜第 " + week + " 週";
    document.getElementById("weekTitle").textContent = data.title;
    document.getElementById("weekDescription").textContent = data.description;
    document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + data.video + "?rel=0";
    document.getElementById("scoreText").textContent = data.score;
    document.getElementById("scoreNote").textContent = data.note;

    const focusList = document.getElementById("focusList");
    const taskList = document.getElementById("taskList");
    data.focus.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      focusList.appendChild(li);
    });
    data.tasks.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      taskList.appendChild(li);
    });

    const prevWeek = Math.max(1, week - 1);
    const nextWeek = Math.min(10, week + 1);
    const prevLink = document.getElementById("prevWeekLink");
    const nextLink = document.getElementById("nextWeekLink");
    prevLink.href = "./二胡小教室-週課程.html?level=" + level + "&week=" + prevWeek;
    nextLink.href = "./二胡小教室-週課程.html?level=" + level + "&week=" + nextWeek;

    if (week === 10) nextLink.textContent = "已經是最後一週";
